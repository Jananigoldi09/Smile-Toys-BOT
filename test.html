<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>
<body style="font-family:monospace;padding:20px;background:#222;color:#fff">
<h1>SmileToys API Test</h1>
<button onclick="testAPI()">Test API Call</button>
<div id="result" style="margin-top:20px;padding:10px;background:#333;border:1px solid #666;min-height:100px;white-space:pre-wrap"></div>

<script>
async function testAPI() {
  const result = document.getElementById('result');
  result.innerHTML = 'Testing...';
  
  try {
    const msg = [{ role: 'user', content: 'Say hello' }];
    console.log('Sending:', msg);
    
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msg })
    });
    
    console.log('Response status:', resp.status);
    const data = await resp.json();
    console.log('Response data:', data);
    
    result.innerHTML = JSON.stringify(data, null, 2);
  } catch(e) {
    console.error('Error:', e);
    result.innerHTML = 'ERROR: ' + e.message + '\n' + e.stack;
  }
}
</script>
</body>
</html>
